<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLM SDK — EbomForm 测试页面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .header {
      background: #fff;
      padding: 16px 24px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .version { color: #999; font-size: 13px; }

    .config-panel {
      background: #fff;
      margin: 16px 24px;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
    }
    .config-panel h3 { margin-bottom: 12px; font-size: 14px; color: #666; }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .form-row label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;
      color: #666;
      flex: 1;
      min-width: 200px;
    }
    .form-row input, .form-row select {
      padding: 6px 10px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn {
      padding: 6px 16px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      background: #fff;
    }
    .btn-primary { background: #1677ff; color: #fff; border-color: #1677ff; }
    .btn-danger { background: #ff4d4f; color: #fff; border-color: #ff4d4f; }
    .btn:hover { opacity: 0.85; }

    .container-wrapper {
      margin: 16px 24px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
      min-height: 400px;
      overflow: hidden;
    }
    #ebom-container {
      min-height: 400px;
    }

    .log-panel {
      margin: 16px 24px;
      background: #1e1e1e;
      border-radius: 8px;
      padding: 16px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-panel h3 { color: #999; font-size: 13px; margin-bottom: 8px; }
    .log-entry { font-family: 'Menlo', 'Consolas', monospace; font-size: 12px; color: #d4d4d4; line-height: 1.6; }
    .log-entry.success { color: #73d13d; }
    .log-entry.error { color: #ff4d4f; }
    .log-entry.info { color: #40a9ff; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🧩 PLM Component SDK — 测试页面</h1>
    <span class="version" id="sdk-version">SDK未加载</span>
  </div>

  <!-- Config Panel -->
  <div class="config-panel">
    <h3>Step 1: 配置参数</h3>
    <div class="form-row">
      <label>
        App ID
        <input type="text" id="appId" value="test-app" />
      </label>
      <label>
        Token (Bearer)
        <input type="text" id="token" placeholder="paste your access_token here" />
      </label>
      <label>
        Base URL
        <input type="text" id="baseUrl" value="http://127.0.0.1:8080" />
      </label>
    </div>
    <div class="form-row">
      <label>
        Project ID
        <input type="text" id="projectId" placeholder="e.g. proj-uuid" />
      </label>
      <label>
        BOM ID
        <input type="text" id="bomId" placeholder="e.g. bom-uuid" />
      </label>
      <label>
        Mode
        <select id="mode">
          <option value="edit">edit (可编辑)</option>
          <option value="view">view (只读)</option>
        </select>
      </label>
    </div>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="doConfigAndRender()">Config → Render</button>
      <button class="btn btn-danger" onclick="doDestroy()">Destroy</button>
    </div>
  </div>

  <!-- Component Container -->
  <div class="container-wrapper">
    <div id="ebom-container"></div>
  </div>

  <!-- Log Panel -->
  <div class="log-panel">
    <h3>Callback 日志</h3>
    <div id="log-output"></div>
  </div>

  <!-- Load SDK (built file) -->
  <!-- During development: use Vite dev server or local build -->
  <script src="/dist-sdk/nimo-plm-components.js"></script>

  <script>
    let renderResult = null;

    // Show SDK version
    window.addEventListener('load', () => {
      if (window.nimoComponent) {
        document.getElementById('sdk-version').textContent = 'SDK v' + window.nimoComponent.version;
      }
    });

    function log(msg, type) {
      const el = document.getElementById('log-output');
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + (type || 'info');
      entry.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      el.appendChild(entry);
      el.scrollTop = el.scrollHeight;
    }

    async function doConfigAndRender() {
      const appId = document.getElementById('appId').value;
      const token = document.getElementById('token').value;
      const baseUrl = document.getElementById('baseUrl').value;
      const projectId = document.getElementById('projectId').value;
      const bomId = document.getElementById('bomId').value;
      const mode = document.getElementById('mode').value;

      if (!token) { alert('请填写 Token'); return; }
      if (!projectId || !bomId) { alert('请填写 Project ID 和 BOM ID'); return; }

      try {
        log('Calling nimoComponent.config()...', 'info');

        await window.nimoComponent.config({
          appId: appId,
          token: token,
          baseUrl: baseUrl,
          componentList: ['EbomForm'],
          locale: 'zh-CN',
        });

        log('Config done! Rendering EbomForm...', 'success');

        // Destroy existing if any
        if (renderResult) {
          renderResult.destroy();
          renderResult = null;
        }

        renderResult = window.nimoComponent.render('EbomForm', {
          projectId: projectId,
          bomId: bomId,
          mode: mode,
          onReady: function(info) {
            log('onReady: ' + JSON.stringify(info), 'success');
          },
          onSubmit: function(result) {
            log('onSubmit: ' + JSON.stringify(result), result.success ? 'success' : 'error');
          },
          onChange: function(dirty) {
            log('onChange: dirty=' + dirty, 'info');
          },
          onError: function(error) {
            log('onError: ' + JSON.stringify(error), 'error');
          },
        }, document.getElementById('ebom-container'));

        log('Render complete! Component mounted.', 'success');
      } catch (err) {
        log('Error: ' + err.message, 'error');
        console.error(err);
      }
    }

    function doDestroy() {
      if (renderResult) {
        renderResult.destroy();
        renderResult = null;
        log('Component destroyed.', 'info');
      } else {
        log('No component to destroy.', 'info');
      }
    }
  </script>
</body>
</html>
